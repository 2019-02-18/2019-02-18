<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <defs>
    <style>
      @keyframes gridMove {
        0% { transform: translateY(0); }
        100% { transform: translateY(20px); }
      }
      @keyframes scanline {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(320px); }
      }
      @keyframes flicker {
        0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
        20%, 24%, 55% { opacity: 0.6; }
      }
      @keyframes glow {
        0%, 100% { filter: drop-shadow(0 0 6px #0ff) drop-shadow(0 0 12px #0ff); }
        50% { filter: drop-shadow(0 0 20px #0ff) drop-shadow(0 0 40px #0ff) drop-shadow(0 0 60px #08f); }
      }
      @keyframes typewriter {
        0% { width: 0; }
        50%, 90% { width: 520px; }
        95%, 100% { width: 0; }
      }
      @keyframes blink {
        50% { opacity: 0; }
      }
      @keyframes floatUp {
        0% { transform: translateY(0) scale(1); opacity: 0.7; }
        50% { opacity: 1; }
        100% { transform: translateY(-320px) scale(0.3); opacity: 0; }
      }
      @keyframes borderPulse {
        0%, 100% { stroke-dashoffset: 0; stroke: #0ff; }
        50% { stroke-dashoffset: 40; stroke: #f0f; }
      }
      .bg { fill: #0a0a1a; }
      .grid-line { stroke: #1a1a3a; stroke-width: 0.5; animation: gridMove 3s linear infinite; }
      .scanline { fill: rgba(0,255,255,0.03); animation: scanline 4s linear infinite; }
      .title {
        font-family: 'Courier New', monospace;
        font-size: 36px; font-weight: bold; fill: #0ff;
        animation: flicker 3s infinite, glow 2s ease-in-out infinite;
      }
      .subtitle { font-family: 'Courier New', monospace; font-size: 14px; fill: #8888ff; }
      .typed-line { font-family: 'Courier New', monospace; font-size: 16px; fill: #0f0; }
      .cursor { fill: #0f0; animation: blink 1s step-end infinite; }
      .type-mask { animation: typewriter 8s steps(40) infinite; }
      .particle { fill: #0ff; opacity: 0.6; animation: floatUp 6s linear infinite; }
      .particle:nth-child(2) { animation-delay: -1s; animation-duration: 8s; }
      .particle:nth-child(3) { animation-delay: -2s; animation-duration: 5s; }
      .particle:nth-child(4) { animation-delay: -3s; animation-duration: 7s; }
      .particle:nth-child(5) { animation-delay: -4s; animation-duration: 9s; }
      .particle:nth-child(6) { animation-delay: -0.5s; animation-duration: 6s; }
      .particle:nth-child(7) { animation-delay: -2.5s; animation-duration: 10s; }
      .particle:nth-child(8) { animation-delay: -1.5s; animation-duration: 4s; }
      .border-frame {
        fill: none; stroke: #0ff; stroke-width: 1.5;
        stroke-dasharray: 20 10;
        animation: borderPulse 4s ease-in-out infinite;
      }
      .tag { font-family: 'Courier New', monospace; font-size: 11px; fill: #555; }
      .bracket { fill: #f0f; font-family: 'Courier New', monospace; font-size: 48px; animation: glow 3s ease-in-out infinite; }
    </style>
  </defs>

  <rect class="bg" width="800" height="320" rx="12"/>

  <g opacity="0.4">
    <line class="grid-line" x1="0" y1="40" x2="800" y2="40"/>
    <line class="grid-line" x1="0" y1="80" x2="800" y2="80" style="animation-delay:-0.5s"/>
    <line class="grid-line" x1="0" y1="120" x2="800" y2="120" style="animation-delay:-1s"/>
    <line class="grid-line" x1="0" y1="160" x2="800" y2="160" style="animation-delay:-1.5s"/>
    <line class="grid-line" x1="0" y1="200" x2="800" y2="200" style="animation-delay:-2s"/>
    <line class="grid-line" x1="0" y1="240" x2="800" y2="240" style="animation-delay:-2.5s"/>
    <line class="grid-line" x1="0" y1="280" x2="800" y2="280" style="animation-delay:-3s"/>
    <line class="grid-line" x1="100" y1="0" x2="100" y2="320" style="animation-delay:-0.3s"/>
    <line class="grid-line" x1="200" y1="0" x2="200" y2="320" style="animation-delay:-0.6s"/>
    <line class="grid-line" x1="300" y1="0" x2="300" y2="320" style="animation-delay:-0.9s"/>
    <line class="grid-line" x1="400" y1="0" x2="400" y2="320" style="animation-delay:-1.2s"/>
    <line class="grid-line" x1="500" y1="0" x2="500" y2="320" style="animation-delay:-1.5s"/>
    <line class="grid-line" x1="600" y1="0" x2="600" y2="320" style="animation-delay:-1.8s"/>
    <line class="grid-line" x1="700" y1="0" x2="700" y2="320" style="animation-delay:-2.1s"/>
  </g>

  <rect class="scanline" x="0" y="0" width="800" height="4"/>

  <g>
    <circle class="particle" cx="120" cy="300" r="2"/>
    <circle class="particle" cx="250" cy="310" r="1.5"/>
    <circle class="particle" cx="380" cy="290" r="2.5"/>
    <circle class="particle" cx="510" cy="305" r="1.8"/>
    <circle class="particle" cx="640" cy="315" r="2.2"/>
    <circle class="particle" cx="700" cy="295" r="1.3"/>
    <circle class="particle" cx="60" cy="308" r="1.7"/>
    <circle class="particle" cx="450" cy="300" r="2"/>
  </g>

  <rect class="border-frame" x="8" y="8" width="784" height="304" rx="8"/>

  <text class="bracket" x="40" y="185">{</text>
  <text class="title" x="110" y="130">FRONT-END CRAFTER</text>

  <g>
    <clipPath id="typeClip">
      <rect class="type-mask" x="110" y="155" height="30"/>
    </clipPath>
    <text class="typed-line" x="110" y="175" clip-path="url(#typeClip)">$ building chrome extensions &amp; MCP tools...</text>
    <rect class="cursor" x="110" y="160" width="10" height="18" clip-path="url(#typeClip)" transform="translate(520,0)"/>
  </g>

  <text class="subtitle" x="110" y="220">// TypeScript · Vue · Chrome Extensions · MCP Protocol</text>

  <text class="bracket" x="720" y="185">}</text>

  <text class="tag" x="30" y="300">&lt;svg&gt;</text>
  <text class="tag" x="720" y="300">&lt;/svg&gt;</text>
</svg>
