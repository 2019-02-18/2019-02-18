name: Generate Cyberpunk Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: 2019-02-18
          outputs: |
            dist/github-snake.svg?color_snake=#00ffff&color_dots=#161b22,#0d3340,#0e4a5c,#0ff,#f0f
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#00ffff&color_dots=#161b22,#0d3340,#0e4a5c,#00ffff,#ff00ff

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
